<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Invoice Generator</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; padding: 10px; color: #333; margin: 0; }
        .container { max-width: 900px; margin: 10px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #installBtn { 
            display: none; 
            width: 100%; 
            background: #3498db; 
            color: white; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: none;
            border-radius: 8px; 
            font-size: 14px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
        }

        .header-inputs { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .header-inputs div { display: flex; flex-direction: column; width: 100%; }
        
        .item-entry { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; padding: 20px; background: #e9ecef; border-radius: 10px; }
        
        input { padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; transition: border 0.3s; }
        input.error { border: 2px solid #e74c3c !important; background-color: #fdf2f2; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #495057; text-transform: uppercase; }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px; background-color: #3498db; color: white; }
        td { padding: 15px; border-bottom: 1px solid #dee2e6; }

        .footer-container { display: flex; flex-direction: column; align-items: flex-end; margin-top: 30px; border-top: 2px solid #3498db; padding-top: 20px; }
        .footer-row { display: flex; align-items: center; justify-content: flex-end; gap: 15px; margin-bottom: 10px; width: 100%; }
        .grand-total { font-size: 16px; font-weight: 800; color: #2c3e50; background: #fff3cd; padding: 10px 20px; border-radius: 8px; }
        
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: 0.3s; }
        .add-btn { background: #27ae60; color: white; padding: 14px 25px; width: 100%; }
        .delete-btn { background: #e74c3c; color: white; padding: 8px 12px; }
        .generate-btn { width: 100%; background: #2c3e50; color: white; padding: 18px; font-size: 18px; margin-top: 30px; }

        @media (min-width: 768px) {
            body { padding: 40px; }
            .header-inputs { flex-direction: row; justify-content: space-between; }
            .header-inputs div { width: 45%; }
            .item-entry { grid-template-columns: 2fr 1fr 1fr auto; align-items: end; }
            .add-btn { width: auto; }
            #installBtn { width: auto; position: absolute; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>

<button id="installBtn">📲 INSTALL APP</button>

<div class="container">
    <div class="header-inputs">
        <div>
            <label>Date of Transaction *</label>
            <input type="date" id="orderDate">
        </div>
        <div>
            <label>Customer Name *</label>
            <input type="text" id="customerName" placeholder="Required Name">
        </div>
    </div>

    <div class="item-entry">
        <div><label>Item Name</label><input type="text" id="itemName" placeholder="Product Description"></div>
        <div><label>Price (₹)</label><input type="number" id="itemPrice" step="0.01" placeholder="0.00"></div>
        <div><label>Qty</label><input type="number" id="itemQty" step="0.01" value="1"></div>
        <button class="add-btn" onclick="addItem()">ADD ITEM</button>
    </div>

    <div class="table-responsive">
        <table id="itemTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="footer-container">
        <div class="footer-row">
            <label>Delivery Charges *</label>
            <input type="number" id="globalDelivery" step="0.01" placeholder="0.00" oninput="render()">
        </div>
        <div class="grand-total" id="grandTotalDisplay">TOTAL: ₹0.00</div>
    </div>

    <button class="generate-btn" onclick="generatePDF()">GENERATE OFFICIAL PDF</button>
</div>

<script>
    let items = [];
    document.getElementById('orderDate').valueAsDate = new Date();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Failed', err));
        });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            deferredPrompt = null;
        }
    });

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const qty = parseFloat(document.getElementById('itemQty').value); 

        if (!name || isNaN(price) || isNaN(qty)) {
            alert("Please fill item details.");
            return;
        }

        items.push({ id: Date.now(), name, price, qty, total: price * qty });
        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
        render();
    }

    function deleteItem(id) {
        items = items.filter(i => i.id !== id);
        render();
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let itemSum = 0;

        items.forEach((item, index) => {
            itemSum += item.total;
            tbody.innerHTML += `<tr>
                <td>${index + 1}</td>
                <td>${item.name}</td>
                <td>₹${item.price.toFixed(2)}</td>
                <td>${item.qty}</td>
                <td>₹${item.total.toFixed(2)}</td>
                <td><button class="delete-btn" onclick="deleteItem(${item.id})">×</button></td>
            </tr>`;
        });

        const delivery = parseFloat(document.getElementById('globalDelivery').value) || 0;
        document.getElementById('grandTotalDisplay').innerText = `TOTAL: ₹${(itemSum + delivery).toFixed(2)}`;
    }

    function generatePDF() {
        const customer = document.getElementById('customerName').value.trim();
        const date = document.getElementById('orderDate').value;
        const deliveryVal = parseFloat(document.getElementById('globalDelivery').value);

        if (!customer || !date || isNaN(deliveryVal)) {
            alert("REQUIRED: Customer Name, Date, and Delivery Charges.");
            return;
        }

        if (items.length === 0) {
            alert("Please add items.");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Header
        doc.setFillColor(44, 62, 80); 
        doc.rect(0, 0, 210, 30, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("Wink It Mussoorie", 15, 20);
        
        // Metadata
        doc.setTextColor(60, 60, 60);
        doc.setFontSize(10);
        doc.text(`Customer: ${customer.toUpperCase()}`, 15, 40);
        doc.text(`DATE: ${date}`, 195, 40, { align: 'right' });

        // Table Headings
        doc.setFont("helvetica", "bold");
        doc.line(15, 45, 195, 45);
        doc.text("S.No", 15, 52);
        doc.text("DESCRIPTION", 30, 52);
        doc.text("PRICE", 100, 52);
        doc.text("UNITS", 135, 52);
        doc.text("TOTAL", 165, 52);
        doc.line(15, 55, 195, 55);

        // Body Items
        doc.setFont("helvetica", "normal");
        let y = 62;
        let itemSum = 0;

        items.forEach((item, index) => {
            doc.text(`${index + 1}`, 15, y);
            doc.text(item.name, 30, y);
            doc.text(`${item.price.toFixed(2)}`, 100, y);
            doc.text(`${item.qty}`, 135, y);
            doc.text(`${item.total.toFixed(2)}`, 165, y);
            
            itemSum += item.total;
            y += 5;
            
            doc.setLineDash([1, 1], 0);
            doc.line(15, y, 195, y);
            doc.setLineDash([], 0); 
            
            y += 8;
            if (y > 260) { doc.addPage(); y = 20; }
        });

        // Totals Section
        y += 5;
        doc.line(120, y, 195, y);
        y += 10;
        doc.text("Item Subtotal:", 125, y);
        doc.text(`${itemSum.toFixed(2)}`, 195, y, { align: 'right' });
        
        y += 8;
        doc.text("Delivery Charges:", 125, y);
        doc.text(`${deliveryVal.toFixed(2)}`, 195, y, { align: 'right' });
        
        y += 12;
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text("GRAND TOTAL (Rs.):", 125, y);
        doc.text(`${(itemSum + deliveryVal).toFixed(2)}`, 195, y, { align: 'right' });

        // PDF Footer with Hyperlinks
        const footerY = 285;
        doc.setFontSize(9);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(0, 0, 255); // Set to blue to indicate link
        doc.line(15, footerY - 5, 195, footerY - 5);
        
        // Link 1: Phone (Tel URI)
        doc.text("Phone: 7983427187", 15, footerY);
        doc.link(15, footerY - 5, 30, 10, { url: 'tel:7983427187' });

        // Link 2: Instagram (URL)
        const instaLabel = "Instagram: @WinkItMussoorie";
        doc.text(instaLabel, 105, footerY, { align: 'center' });
        doc.link(85, footerY - 5, 40, 10, { url: 'https://www.instagram.com/WinkItMussoorie' });

        // Link 3: Website (URL)
        const webLabel = "Website: www.winkitmussoorie.com";
        doc.text(webLabel, 195, footerY, { align: 'right' });
        doc.link(160, footerY - 5, 35, 10, { url: 'http://www.winkitmussoorie.com' });

        doc.save(`Invoice_${customer}.pdf`);
    }
</script>

</body>
</html>
